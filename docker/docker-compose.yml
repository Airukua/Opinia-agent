version: "3.9"

services:
  api:
    image: comment-analytics-api:latest
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      OUTPUT_BASE_DIR: /app/outputs
    volumes:
      - ../models:/app/models:ro
      - ../outputs:/app/outputs
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - api
